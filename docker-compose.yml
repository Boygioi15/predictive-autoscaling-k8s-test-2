name: predictive-autoscaling-k8s-test
services:
  general-resource-demand-service:
    build: ./general-resource-demand-service
    container_name: general-resource-demand-service
    ports:
      - "3000:3000"
  locust:
    build:
      context: ./locust-test
      dockerfile: Dockerfile
    container_name: locust
    env_file:
      - ./locust-test/locust.env
    ports:
      - "8089:8089"
    volumes:
      - ./shares:/mnt/shares
    entrypoint:
      - sh
      - /mnt/locust/start-locust.sh

  custom-load-generator:
    build:
      context: ./custom-load-generator
      dockerfile: Dockerfile
    container_name: custom-load-generator
    image:  docker.io/boygioi/${CUSTOM_LOAD_GENERATOR_IMAGE}
    volumes:
      - custom_load_generator_output:/app/output

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      # Gắn file cấu hình ở Bước 2 vào container
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      # Lưu trữ dữ liệu lịch sử để không bị mất khi tắt máy
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "2999:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  ai-model:
    build: ./ai-model
    container_name: ai-model
    depends_on:
      - prometheus
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - ./ai-model/data:/app/data

volumes:
  prometheus_data:
  grafana_data:
  custom_load_generator_output:
