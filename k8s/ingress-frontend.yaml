apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-frontend

spec:
  ingressClassName: nginx
  rules:
    # - host: silkeste.fun
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80