apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
spec:
  replicas: 1 # Scale this as needed
  selector:
    matchLabels:
      app: locust-worker
  template:
    metadata:
      labels:
        app: locust-worker
    spec:
      containers:
        - name: locust-worker
          image: locust-test:v1
          imagePullPolicy: Never
          args: ["-f", "/mnt/locust/locustfile.py", "--worker", "--master-host=locust-master"]
          env: 
            - name: PRIME_USER_WEIGHT
              value: "10" # Set weight for PrimeUser
            - name: TEXT_USER_WEIGHT
              value: "10" # Set weight for TextWebsiteUser