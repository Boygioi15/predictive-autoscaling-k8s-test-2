apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust-exporter
  template:
    metadata:
      labels:
        app: locust-exporter
    spec:
      containers:
        - name: locust-exporter
          image: containersol/locust_exporter
          env:
            - name: LOCUST_EXPORTER_URI
              value: "http://locust-master:8089"
          ports:
            - containerPort: 9646
---
apiVersion: v1
kind: Service
metadata:
  name: locust-exporter
  labels:
    app: locust-exporter
    release: prometheus # This label must match your kube-prometheus-stack selector
spec:
  selector:
    app: locust-exporter
  ports:
    - name: metrics
      port: 9646
      targetPort: 9646