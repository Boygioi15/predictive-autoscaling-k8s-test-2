apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/boygioi/frontend-service:latest
          ports:
            - containerPort: 8080 # Cổng web server của frontend

          # --- PHẦN KHÁC BIỆT NẰM Ở ĐÂY ---

