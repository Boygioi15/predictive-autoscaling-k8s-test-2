apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecasting-service-deployment
  labels:
    app: forecasting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecasting-service
  template:
    metadata:
      labels:
        app: forecasting-service
    spec:
      containers:
        - name: forecasting-service-container
          image: docker.io/boygioi/forecasting-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: PROMETHEUS_BASE_URL
              value: http://monitoring-stack-kube-prom-prometheus.monitoring.svc.cluster.local:9090
            - name: PROMETHEUS_QUERY
              value: sum(rate(http_requests_total{job="prime-service"}[2m]))
            - name: AI_SERVER_URL
              value: http://172.16.1.14:6002/invocations
            - name: REPLICA_DIVISOR
              value: "5"
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "10"
---
apiVersion: v1
kind: Service
metadata:
  name: forecasting-service
  labels:
    app: forecasting-service
spec:
  type: ClusterIP
  selector:
    app: forecasting-service
  ports:
    - port: 8080
      targetPort: 8080
