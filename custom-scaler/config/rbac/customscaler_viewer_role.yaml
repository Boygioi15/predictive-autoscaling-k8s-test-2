# This rule is not used by the project custom-scaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to autoscaling.my.domain resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: custom-scaler
    app.kubernetes.io/managed-by: kustomize
  name: customscaler-viewer-role
rules:
- apiGroups:
  - autoscaling.my.domain
  resources:
  - customscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling.my.domain
  resources:
  - customscalers/status
  verbs:
  - get
