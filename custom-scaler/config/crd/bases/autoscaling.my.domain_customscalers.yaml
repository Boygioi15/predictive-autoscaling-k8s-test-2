---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: customscalers.autoscaling.my.domain
spec:
  group: autoscaling.my.domain
  names:
    kind: CustomScaler
    listKind: CustomScalerList
    plural: customscalers
    singular: customscaler
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: CustomScaler is the Schema for the customscalers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of CustomScaler
            properties:
              deploymentName:
                description: Name of the Deployment to scale
                type: string
              forecastDeployment:
                description: |-
                  Optional deployment key sent to the forecasting service.
                  When omitted, the controller derives it from DeploymentName.
                type: string
              intervalMinutes:
                description: Polling interval in minutes. Defaults to 1 minute when
                  omitted or invalid.
                type: integer
              maxReplicas:
                description: Optional per-scaler override for the maximum replica
                  clamp.
                format: int32
                type: integer
              minReplicas:
                description: Optional per-scaler override for the minimum replica
                  clamp.
                format: int32
                type: integer
              safeRpsPerPod:
                description: Optional per-scaler override for the safe per-pod RPS
                  capacity.
                type: number
              safetyFactor:
                description: Optional per-scaler override for the forecast safety
                  factor.
                type: number
              sparePod:
                description: Optional per-scaler override for the number of spare
                  pods to add.
                format: int32
                type: integer
              url:
                description: The forecasting service endpoint to call.
                type: string
              workerPrototype:
                description: Optional prototype settings for durable worker-count
                  planning.
                properties:
                  maxBatchSize:
                    description: Maximum number of worker operations to enqueue in
                      a single reconcile.
                    format: int32
                    type: integer
                  nodeLabelKey:
                    description: Optional node label key used to identify worker nodes.
                    type: string
                  nodeLabelValue:
                    description: Optional node label value used together with NodeLabelKey.
                    type: string
                  targetWorkerCount:
                    description: |-
                      Optional manual override for the desired worker-node count.
                      When omitted, the controller computes it from desired replicas, safety pods,
                      unschedulable pods, node allocatable CPU, and app pod request CPU.
                    format: int32
                    type: integer
                type: object
            required:
            - deploymentName
            - url
            type: object
          status:
            description: status defines the observed state of CustomScaler
            properties:
              currentReplicas:
                description: Current replica count
                format: int32
                type: integer
              ingressPressureBump:
                description: Stateful ingress pressure level used to accumulate emergency
                  scaling under sustained saturation.
                format: int32
                type: integer
              ingressPressureReason:
                description: Human-readable reason for the latest ingress pressure
                  bump transition.
                type: string
              lastDesiredReplicas:
                description: The latest desired replica count computed by the operator.
                format: int32
                type: integer
              lastEffectiveRps:
                description: The latest buffered RPS value after applying operator
                  safety logic.
                type: number
              lastForecastPeak:
                description: The latest forecast peak seen from the forecasting service.
                type: number
              workerPrototype:
                description: Durable worker-planning state for the prototype node
                  scaler.
                properties:
                  activeOperation:
                    description: |-
                      Legacy single-operation mirror kept for backwards-compatible status transitions.
                      New logic should use ActiveOperations.
                    properties:
                      commandFinishedAt:
                        description: When the executor observed the command job complete.
                        format: date-time
                        type: string
                      jobName:
                        description: Name of the Kubernetes Job executing the operation.
                        type: string
                      jobNamespace:
                        description: Namespace of the Kubernetes Job executing the
                          operation.
                        type: string
                      message:
                        description: Last executor message for humans.
                        type: string
                      operationType:
                        description: 'Type of worker operation: create or delete.'
                        type: string
                      phase:
                        description: 'Current executor phase: Running or WaitingForObservation.'
                        type: string
                      requestedCount:
                        description: Number of workers requested by this operation.
                          The prototype uses 1.
                        format: int32
                        type: integer
                      startedAt:
                        description: When the executor started the operation.
                        format: date-time
                        type: string
                      targetNodeName:
                        description: |-
                          Concrete node name passed to the executor. For create, this is the planned new node name.
                          For delete, this is the node selected for eviction and teardown.
                        type: string
                    type: object
                  activeOperations:
                    description: In-flight worker operations managed by the prototype
                      executor.
                    items:
                      properties:
                        commandFinishedAt:
                          description: When the executor observed the command job
                            complete.
                          format: date-time
                          type: string
                        jobName:
                          description: Name of the Kubernetes Job executing the operation.
                          type: string
                        jobNamespace:
                          description: Namespace of the Kubernetes Job executing the
                            operation.
                          type: string
                        message:
                          description: Last executor message for humans.
                          type: string
                        operationType:
                          description: 'Type of worker operation: create or delete.'
                          type: string
                        phase:
                          description: 'Current executor phase: Running or WaitingForObservation.'
                          type: string
                        requestedCount:
                          description: Number of workers requested by this operation.
                            The prototype uses 1.
                          format: int32
                          type: integer
                        startedAt:
                          description: When the executor started the operation.
                          format: date-time
                          type: string
                        targetNodeName:
                          description: |-
                            Concrete node name passed to the executor. For create, this is the planned new node name.
                            For delete, this is the node selected for eviction and teardown.
                          type: string
                      type: object
                    type: array
                  effectiveWorkerCount:
                    description: Effective worker count used by ensure_worker = ready
                      + pendingCreate - pendingDelete.
                    format: int32
                    type: integer
                  lastAction:
                    description: 'Last prototype action taken: enqueue-create, enqueue-delete,
                      or stable.'
                    type: string
                  lastEnsureTime:
                    description: Last time the prototype worker planner ran.
                    format: date-time
                    type: string
                  lastReason:
                    description: Human-readable explanation for the last prototype
                      action.
                    type: string
                  observedReadyWorkerCount:
                    description: Latest observed count of Ready worker nodes.
                    format: int32
                    type: integer
                  pendingCreateCount:
                    description: Number of worker creations that have been planned
                      but not yet observed as Ready.
                    format: int32
                    type: integer
                  pendingDeleteCount:
                    description: Number of worker deletions that have been planned
                      but not yet observed as gone.
                    format: int32
                    type: integer
                  targetWorkerCount:
                    description: Latest desired worker count requested by the prototype.
                    format: int32
                    type: integer
                type: object
            required:
            - currentReplicas
            - lastDesiredReplicas
            - lastEffectiveRps
            - lastForecastPeak
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
