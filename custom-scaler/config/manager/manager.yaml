apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: custom-scaler
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: custom-scaler
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: custom-scaler
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: custom-scaler
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
            - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: Exists
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: role
        operator: Equal
        value: infra
        effect: NoSchedule
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        imagePullPolicy: Always
        env:
        - name: SCALER_FORECAST_CONTRACT_ID
          value: "demo-linear-regression-v1"
        - name: SCALER_REQUESTS_PER_POD
          value: "1500"
        - name: SCALER_CPU_SECONDS_PER_POD
          value: "30"
        - name: SCALER_SAFETY_FACTOR
          value: "1.20"
        - name: SCALER_SPARE_POD
          value: "3"
        - name: SCALER_MIN_REPLICAS
          value: "1"
        - name: SCALER_MAX_REPLICAS
          value: "40"
        - name: SCALER_SCALE_DOWN_POLICY
          value: "safe"
        - name: SCALER_APP_ERROR_RATE_THRESHOLD
          value: "0.05"
        - name: SCALER_INGRESS_P99_THRESHOLD_SECONDS
          value: "1"
        - name: SCALER_INGRESS_DEPLOYMENT_NAME
          value: "ingress-nginx-controller"
        - name: SCALER_INGRESS_DEPLOYMENT_NAMESPACE
          value: "ingress-nginx"
        - name: SCALER_REACTIVE_REQUIRED_POINTS
          value: "2"
        - name: SCALER_REACTIVE_INCREASE_STEP
          value: "1"
        - name: SCALER_REACTIVE_DECREASE_STEP
          value: "2"
        - name: SCALER_REACTIVE_MAX_BUMP
          value: "10"
        - name: SCALER_REACTIVE_REPLICA_STEP
          value: "2"
        - name: SCALER_WORKER_NODE_ALLOCATABLE_MILLICPU
          value: "3800"
        - name: SCALER_WORKER_POD_REQUEST_MILLICPU
          value: "400"
        - name: SCALER_WORKER_SAFETY_PODS
          value: "1"
        - name: SCALER_INGRESS_REPLICAS_PER_WORKER
          value: "2"
        - name: SCALER_WORKER_CAPACITY_STRATEGY
          value: "free-slots"
        - name: SCALER_WORKER_MIN_COUNT
          value: "1"
        - name: SCALER_WORKER_MAX_COUNT
          value: "4"
        - name: SCALER_WORKER_EXECUTOR_NAMESPACE
          value: "custom-scaler-system"
        - name: SCALER_WORKER_EXECUTOR_SERVICE_ACCOUNT
          value: "custom-scaler-controller-manager"
        - name: SCALER_WORKER_EXECUTOR_IMAGE
          value: "docker.io/boygioi/vm-job:latest"
        - name: SCALER_WORKER_CREATE_COMMAND
          value: "/workspace/linux-script/executor-create-worker.sh"
        - name: SCALER_WORKER_DELETE_COMMAND
          value: "/workspace/linux-script/executor-delete-worker.sh"
        - name: SCALER_WORKER_NODE_NAME_PREFIX
          value: "k3s-worker"
        - name: SCALER_WORKER_EXECUTOR_CONFIG_MAP_NAME
          value: "custom-scaler-vm-job-config"
        - name: SCALER_WORKER_EXECUTOR_SECRET_NAME
          value: "custom-scaler-vm-job-secret"
        - name: SCALER_WORKER_EXECUTOR_SECRET_MOUNT_PATH
          value: "/var/run/vm-job-secret"
        - name: SCALER_WORKER_EXECUTOR_TTL_SECONDS
          value: "3600"
        - name: SCALER_WORKER_OBSERVATION_TIMEOUT_SECONDS
          value: "600"
        - name: SCALER_WORKER_MAX_CONCURRENT_CREATE_OPS
          value: "1"
        - name: SCALER_WORKER_MAX_CONCURRENT_DELETE_OPS
          value: "1"
        name: manager
        ports: []
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
